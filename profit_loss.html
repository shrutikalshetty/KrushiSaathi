{% extends "base.html" %}

{% block content %}

<h1>📊 Profit / Loss Report</h1>

<div class="report-box">

<h3>💰 Total Crop Income</h3>
<p class="income">₹ {{ total_income }}</p>

<h3>💸 Total Expenses</h3>
<p class="expense">₹ {{ total_expense }}</p>

<h2>📈 Net Result</h2>

{% if profit >= 0 %}
<p class="profit">Profit: ₹ {{ profit }}</p>
{% else %}
<p class="loss">Loss: ₹ {{ profit }}</p>
{% endif %}

</div>

{% endblock %}
