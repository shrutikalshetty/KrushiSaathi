<!DOCTYPE html>
<html>
<head>

<title>Register - KrushiSaathi</title>

<style>

body {
margin: 0;
font-family: Arial;
background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
url("https://images.unsplash.com/photo-1500382017468-9049fed747ef");
background-size: cover;
height: 100vh;
display: flex;
justify-content: center;
align-items: center;
}

.box {
background: white;
padding: 40px;
border-radius: 10px;
width: 300px;
text-align: center;
}

input {
width: 100%;
padding: 10px;
margin: 10px 0;
}

button {
width: 100%;
padding: 10px;
background: green;
color: white;
border: none;
}

</style>

</head>

<body>

<div class="box">

<h2>🌱 Register</h2>

<form method="POST">

<input type="text" name="username" placeholder="Username" required>
<input type="password" name="password" placeholder="Password" required>

<button type="submit">Register</button>

</form>

<a href="/login">Already have account? Login</a>

</div>

</body>
</html>
