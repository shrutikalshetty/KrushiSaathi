<!DOCTYPE html>
<html>
<head>

<title>Login - KrushiSaathi</title>

<style>

body {
margin: 0;
font-family: Arial;
background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
url("https://images.unsplash.com/photo-1500382017468-9049fed747ef");
background-size: cover;
height: 100vh;
display: flex;
justify-content: center;
align-items: center;
}

.login-box {
background: white;
padding: 40px;
border-radius: 10px;
width: 300px;
text-align: center;
box-shadow: 0px 0px 10px rgba(0,0,0,0.3);
}

h2 {
color: #2e7d32;
}

input {
width: 100%;
padding: 10px;
margin: 10px 0;
border-radius: 5px;
border: 1px solid #ccc;
}

button {
width: 100%;
padding: 10px;
background: #2e7d32;
color: white;
border: none;
border-radius: 5px;
cursor: pointer;
}

a {
display: block;
margin-top: 15px;
color: #2e7d32;
text-decoration: none;
}

</style>

</head>

<body>

<div class="login-box">

<h2>🌱 KrushiSaathi Login</h2>

<form method="POST">

<input type="text" name="username" placeholder="Username" required>
<input type="password" name="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

<a href="/register">Create Account</a>

</div>

</body>
</html>
