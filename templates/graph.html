{% extends "base.html" %}

{% block content %}

<h1>📊 Expense Analysis (Bar Graph)</h1>

<div style="width:70%; margin:auto;">
    <canvas id="expenseChart"></canvas>
</div>

<script>

let labels = {{ labels | tojson }};
let values = {{ values | tojson }};

const ctx = document.getElementById('expenseChart');

new Chart(ctx, {
    type: 'bar',   // ✅ changed from pie → bar
    data: {
        labels: labels,
        datasets: [{
            label: 'Expense Amount (₹)',
            data: values,
            backgroundColor: '#4CAF50',   // green theme 🌱
            borderColor: '#2e7d32',
            borderWidth: 2
        }]
    },
    options: {
        responsive: true,
        plugins: {
            legend: {
                display: false
            }
        },
        scales: {
            y: {
                beginAtZero: true
            }
        }
    }
});

</script>

{% endblock %}
